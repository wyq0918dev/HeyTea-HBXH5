<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1.0" />
	<title>喜茶·春日限定</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
		}

		.page {
			width: 100vw;
			height: 100vh;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			text-align: center;
			padding: 20px;
		}

		#page-welcome {
			background: linear-gradient(to bottom, #FDE0DC, #F9CBBD);
		}

		.logo {
			font-size: 28px;
			font-weight: bold;
			color: #C53030;
			margin-bottom: 16px;
		}

		.slogan {
			font-size: 18px;
			color: #5A2A27;
			max-width: 80%;
			line-height: 1.5;
		}

		.btn {
			padding: 12px 30px;
			background: #C53030;
			color: white;
			border: none;
			border-radius: 24px;
			font-size: 16px;
			cursor: pointer;
			margin-top: 20px;
		}

		/* 产品页面背景 (后期完善) */
		#page-product {
			background: #FFF9F9;
		}
	</style>
</head>
<script>
	function goToPage(pageName) {
		document.querySelectorAll('.page').forEach(page => {
			page.style.display = 'none';
		});
		document.getElementById('page-' + pageName).style.display = 'flex';
	}
	// 默认显示欢迎页
	goToPage('welcome');
</script>

<body>
	<!-- 欢迎页 -->
	<div id="page-welcome" , class="page">
		<div class="logo">
			HEYTEA 喜茶
		</div>
		<div class="slogan">
			春日限定·一口尝尽江南春
		</div>
		<button class="btn" onclick="goToPage('product')">
			立即探索
		</button>
	</div>
	<!-- 产品页 (隐藏状态) -->
	<div id="page-product" class="page">
		[产品页 - 第三次课再开发]
	</div>
</body>

</html>
