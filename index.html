<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
		<title>喜茶·春日限定</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
			}
			#page-welcome {
				width: 100vw;
				height: 100vh;
				background: linear-gradient(to bottom, #FDE0DC, #F9CBBD);
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				text-align: center;
				padding: 20px;
			}
			.logo {
				font-size: 28px;
				font-weight: bold;
				color: #C53030;
				margin-bottom: 16px;
			}
			.slogan {
				font-size: 18px;
				color: #5A2A27;
				max-width: 80%;
				line-height: 1.5;
			}
		</style>
	</head>
	<body>
		<div id="page-welcome">
			<div class="logo">
				HEYTEA 喜茶
			</div>
			<div class="slogan">
				春日限定·一口尝尽江南春
			</div>
		</div>

</html>
